<!-- ========================================== -->
<!-- PANTALLA: REGISTRO DE PRODUCTOS             -->
<!-- ========================================== -->

<div class="card">
  <div class="card-header">
    <h2><i class="fas fa-boxes"></i> Registrar lote</h2>
    <span class="badge">Múltiples productos</span>
  </div>
  <form id="loteForm">
    <!-- Datos comunes del lote -->
    <div class="form-row">
      <div class="form-group">
        <label><i class="fas fa-ship"></i> Flete internacional (USD)</label>
        <input type="number" id="flete" step="0.01" placeholder="Ej: 80" value="0" />
      </div>
      <div class="form-group" style="flex:2;">
        <label><i class="fas fa-plus-circle"></i> Gastos extra (compartidos)</label>
        <div class="extra-gastos-container">
          <div id="gastosWrapper">
            <div class="gasto-item">
              <input type="text" class="gasto-concepto" placeholder="Concepto" />
              <input type="number" step="0.01" class="gasto-monto" placeholder="Monto" />
              <button type="button" class="btn-remove-gasto" style="display:none;"><i class="fas fa-trash"></i></button>
            </div>
          </div>
          <button type="button" class="btn btn-small" id="addGastoBtn"><i class="fas fa-plus"></i> Agregar</button>
        </div>
      </div>
    </div>

    <!-- Tabla de productos -->
    <div style="margin-top:14px;">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:8px; flex-wrap:wrap; gap:6px;">
        <h3 style="font-size:0.95rem;"><i class="fas fa-list"></i> Productos</h3>
        <button type="button" class="btn btn-small" id="addProductoBtn"><i class="fas fa-plus"></i> Agregar</button>
      </div>
      <div id="productosTableWrapper">
        <table class="productos-table">
          <thead>
            <tr>
              <th>Nombre</th>
              <th>SKU</th>
              <th>Precio (USD)</th>
              <th>Cantidad</th>
              <th>Color/Tamaño</th>
              <th style="width:30px;"></th>
            </tr>
          </thead>
          <tbody id="productosBody">
            <!-- Las filas se agregan dinámicamente -->
          </tbody>
        </table>
      </div>
      <div style="margin-top:8px; font-size:0.75rem; color:var(--text-secondary);">
        <i class="fas fa-info-circle"></i> Los gastos comunes se prorratean proporcionalmente al valor de compra.
      </div>
    </div>

    <!-- Precios de venta -->
    <div class="form-row" style="margin-top:16px; border-top:1px solid var(--border-color); padding-top:16px;">
      <div class="form-group">
        <label><i class="fas fa-percent"></i> Modo de precio</label>
        <select id="modoPrecio">
          <option value="porcentaje">% Ganancia</option>
          <option value="gananciaFija">Ganancia fija (USD)</option>
          <option value="precioMercado">Precio de mercado</option>
        </select>
      </div>
      <div class="form-group">
        <label><i class="fas fa-sliders-h"></i> Valor</label>
        <input type="number" id="valorPrecio" step="0.01" placeholder="40" value="40" />
        <small>Ej: 40 = 40% de ganancia</small>
      </div>
    </div>

    <div class="form-actions" style="display:flex; justify-content:flex-end; gap:10px; margin-top:12px;">
      <button type="submit" class="btn btn-primary"><i class="fas fa-save"></i> Guardar lote</button>
    </div>
  </form>
</div>
